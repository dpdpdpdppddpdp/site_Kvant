meta:
  environment: jvm
  toolchain:
    name: maven
    version: "17"
build:
  image: null
  args: clean package -DskipTests
  artifacts:
    target/*.jar: /
run:
  image: null
  args: -Dspring.profiles.active=prod
  jarName: kvant-crm-1.0.0.jar
  persistenceMount: /data
  containerPort: "80"
  servicePort: "80"
