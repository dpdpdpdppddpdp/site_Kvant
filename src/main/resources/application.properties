# Сервер
server.port=${SERVER_PORT:8443}

# HTTPS / SSL (отключается если SSL_ENABLED=false)
server.ssl.enabled=${SSL_ENABLED:true}
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=kvant2024
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=kvant

# HTTP -> HTTPS редирект (порт 8081)
server.http.port=${HTTP_PORT:8081}

# База данных PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/kvant_db}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

