<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель | Kvant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --bg-light: #f8fafc;
            --bg-white: #ffffff;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            margin-bottom: 32px;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-family: inherit;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-white);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.875rem;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .table-container {
            background: var(--bg-white);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .table-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 24px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--bg-light);
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            font-size: 0.95rem;
        }

        tr:hover {
            background: var(--bg-light);
        }

        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-new {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .status-contacted {
            background: #fef3c7;
            color: #92400e;
        }

        .status-converted {
            background: #d1fae5;
            color: #065f46;
        }

        .status-closed {
            background: #fee2e2;
            color: #991b1b;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 16px 24px;
            border-radius: 8px;
            margin-bottom: 24px;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        @media (max-width: 1024px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 0.875rem;
            }

            th, td {
                padding: 12px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container header-inner">
            <div class="logo">Kvant Admin</div>
            <div style="display: flex; gap: 12px;">
                <a href="/cms.html" class="btn btn-success">CMS контент</a>
                <a href="/" class="btn btn-primary">На сайт</a>
                <button class="btn btn-success" onclick="exportToExcel()">
                    Экспорт в Excel
                </button>
                <button class="btn btn-primary" onclick="loadLeads()">
                    Обновить
                </button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">Всего заявок</div>
                <div class="stat-value" id="totalLeads">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Новых</div>
                <div class="stat-value" id="newLeads">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">За сегодня</div>
                <div class="stat-value" id="todayLeads">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">За неделю</div>
                <div class="stat-value" id="weekLeads">0</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <div class="table-title">Все заявки</div>
            </div>
            <div id="leadsContent">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <!-- Модальное окно редактирования заявки -->
    <div id="editModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:#fff;border-radius:12px;padding:32px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;margin:20px;">
            <h3 style="margin-bottom:20px;font-size:1.2rem;">Редактировать заявку #<span id="editLeadId"></span></h3>
            <div style="display:grid;gap:16px;">
                <div><label style="display:block;margin-bottom:6px;font-size:0.85rem;font-weight:600;color:#64748b;">Имя</label>
                    <input id="eFirstName" style="width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:0.95rem;"></div>
                <div><label style="display:block;margin-bottom:6px;font-size:0.85rem;font-weight:600;color:#64748b;">Телефон</label>
                    <input id="ePhone" style="width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:0.95rem;"></div>
                <div><label style="display:block;margin-bottom:6px;font-size:0.85rem;font-weight:600;color:#64748b;">Email</label>
                    <input id="eEmail" style="width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:0.95rem;"></div>
                <div><label style="display:block;margin-bottom:6px;font-size:0.85rem;font-weight:600;color:#64748b;">Услуга</label>
                    <select id="eServiceType" style="width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:0.95rem;">
                        <option value="pool">Бассейн</option>
                        <option value="summer-house">Летний домик</option>
                        <option value="veranda">Веранда</option>
                        <option value="gate">Ворота</option>
                        <option value="fence">Забор</option>
                        <option value="glazing">Остекление</option>
                    </select></div>
                <div><label style="display:block;margin-bottom:6px;font-size:0.85rem;font-weight:600;color:#64748b;">Статус</label>
                    <select id="eStatus" style="width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:0.95rem;">
                        <option value="NEW">Новая</option>
                        <option value="CONTACTED">Контакт установлен</option>
                        <option value="IN_PROGRESS">В работе</option>
                        <option value="CONVERTED">Завершена</option>
                        <option value="CLOSED">Закрыта</option>
                    </select></div>
                <div><label style="display:block;margin-bottom:6px;font-size:0.85rem;font-weight:600;color:#64748b;">Комментарий</label>
                    <textarea id="eComment" rows="3" style="width:100%;padding:10px 14px;border:2px solid #e2e8f0;border-radius:8px;font-size:0.95rem;font-family:inherit;resize:vertical;"></textarea></div>
            </div>
            <div style="display:flex;gap:12px;margin-top:20px;">
                <button onclick="saveLeadEdit()" class="btn btn-primary">Сохранить</button>
                <button onclick="closeEditModal()" class="btn" style="background:#f1f5f9;color:#475569;">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        let allLeads = [];
        let editingLeadId = null;

        const SERVICE_LABELS = {
            'pool':'Бассейн','summer-house':'Летний домик','veranda':'Веранда',
            'gate':'Ворота','fence':'Забор','glazing':'Остекление'
        };

        async function loadLeads() {
            const content = document.getElementById('leadsContent');
            content.innerHTML = '<div class="loading">Загрузка...</div>';
            try {
                const response = await fetch('/api/leads');
                if (!response.ok) throw new Error('Ошибка загрузки');
                allLeads = await response.json();
                renderLeads();
                updateStats();
            } catch (error) {
                content.innerHTML = '<div class="error">Ошибка загрузки заявок: ' + error.message + '</div>';
            }
        }

        function renderLeads() {
            const content = document.getElementById('leadsContent');
            if (allLeads.length === 0) {
                content.innerHTML = '<div class="empty">Заявок пока нет</div>';
                return;
            }
            let html = '<table><thead><tr>';
            html += '<th>ID</th><th>Дата</th><th>Клиент</th><th>Телефон</th><th>Email</th>';
            html += '<th>Услуга</th><th>Источник</th><th>Реферер</th><th>Статус</th><th>Действия</th>';
            html += '</tr></thead><tbody>';
            allLeads.forEach(lead => {
                const date = new Date(lead.createdAt);
                const fd = date.toLocaleDateString('ru-RU') + ' ' + date.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
                const fullName = ((lead.firstName||'') + ' ' + (lead.lastName||'')).trim() || '—';
                const statusClass = getStatusClass(lead.status);
                const source = buildSourceLabel(lead);
                const referrer = lead.referrerUrl
                    ? `<span title="${lead.referrerUrl}" style="cursor:help;color:#6366f1;">${truncate(lead.referrerUrl,20)}</span>`
                    : '—';
                const service = SERVICE_LABELS[lead.serviceType] || lead.serviceType || '—';
                html += `<tr>
                    <td>${lead.id}</td>
                    <td>${fd}</td>
                    <td><strong>${fullName}</strong>${lead.userId ? '<br><span style="font-size:0.75rem;color:#10b981;">[Зарег.]</span>' : ''}</td>
                    <td>${lead.phone||'—'}</td>
                    <td>${lead.email||'—'}</td>
                    <td>${service}</td>
                    <td>${source}</td>
                    <td>${referrer}</td>
                    <td><span class="status ${statusClass}">${lead.status||'NEW'}</span></td>
                    <td><button class="btn btn-primary" style="padding:6px 14px;font-size:0.8rem;" onclick="openEditModal(${lead.id})">Изменить</button></td>
                </tr>`;
            });
            html += '</tbody></table>';
            content.innerHTML = html;
        }

        function buildSourceLabel(lead) {
            if (!lead.utmSource && !lead.utmCampaign && !lead.utmMedium) return '<span style="color:#94a3b8;">Прямой</span>';
            let parts = [];
            if (lead.utmSource) parts.push(`<strong>${lead.utmSource}</strong>`);
            if (lead.utmMedium) parts.push(lead.utmMedium);
            if (lead.utmCampaign) parts.push(`<em>${lead.utmCampaign}</em>`);
            return parts.join(' / ');
        }

        function truncate(str, len) {
            if (!str) return '';
            try { str = new URL(str).hostname + new URL(str).pathname; } catch(e){}
            return str.length > len ? str.substring(0,len) + '…' : str;
        }

        function getStatusClass(status) {
            switch(status) {
                case 'NEW': return 'status-new';
                case 'CONTACTED': return 'status-contacted';
                case 'IN_PROGRESS': return 'status-contacted';
                case 'CONVERTED': return 'status-converted';
                case 'CLOSED': return 'status-closed';
                default: return 'status-new';
            }
        }

        function updateStats() {
            const total = allLeads.length;
            const newLeads = allLeads.filter(l => l.status === 'NEW').length;
            const today = new Date(); today.setHours(0,0,0,0);
            const todayLeads = allLeads.filter(l => new Date(l.createdAt) >= today).length;
            const weekAgo = new Date(); weekAgo.setDate(weekAgo.getDate() - 7);
            const weekLeads = allLeads.filter(l => new Date(l.createdAt) >= weekAgo).length;
            document.getElementById('totalLeads').textContent = total;
            document.getElementById('newLeads').textContent = newLeads;
            document.getElementById('todayLeads').textContent = todayLeads;
            document.getElementById('weekLeads').textContent = weekLeads;
        }

        function openEditModal(id) {
            const lead = allLeads.find(l => l.id === id);
            if (!lead) return;
            editingLeadId = id;
            document.getElementById('editLeadId').textContent = id;
            document.getElementById('eFirstName').value = lead.firstName || '';
            document.getElementById('ePhone').value = lead.phone || '';
            document.getElementById('eEmail').value = lead.email || '';
            document.getElementById('eServiceType').value = lead.serviceType || 'pool';
            document.getElementById('eStatus').value = lead.status || 'NEW';
            document.getElementById('eComment').value = lead.comment || '';
            const modal = document.getElementById('editModal');
            modal.style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
            editingLeadId = null;
        }

        async function saveLeadEdit() {
            if (!editingLeadId) return;
            const body = {
                firstName: document.getElementById('eFirstName').value,
                phone: document.getElementById('ePhone').value,
                email: document.getElementById('eEmail').value,
                serviceType: document.getElementById('eServiceType').value,
                status: document.getElementById('eStatus').value,
                comment: document.getElementById('eComment').value
            };
            try {
                const resp = await fetch('/api/leads/' + editingLeadId, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                if (!resp.ok) throw new Error('Ошибка сохранения');
                closeEditModal();
                loadLeads();
            } catch(e) {
                alert('Ошибка: ' + e.message);
            }
        }

        // Закрыть по клику вне модалки
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditModal();
        });

        async function exportToExcel() {
            try {
                const response = await fetch('/api/leads/export/excel');
                if (!response.ok) throw new Error('Ошибка экспорта');
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'leads_' + new Date().getTime() + '.xlsx';
                document.body.appendChild(a); a.click();
                window.URL.revokeObjectURL(url); document.body.removeChild(a);
            } catch (error) {
                alert('Ошибка экспорта: ' + error.message);
            }
        }

        loadLeads();
        setInterval(loadLeads, 30000);
    </script>
</body>
</html>
